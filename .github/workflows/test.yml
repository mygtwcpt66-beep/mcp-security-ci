name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test
      - run: node ./bin/mcp-security-ci.js --config test/fixtures/risky.mcp.json --format sarif --fail-on none > mcp-security.sarif
